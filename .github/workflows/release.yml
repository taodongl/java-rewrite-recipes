name: Release to Maven Central

# Publishes the artifact to Maven Central (Sonatype Central Portal).
# Triggers:
#   * when a GitHub Release is published, or
#   * manually via the "Run workflow" button (workflow_dispatch).
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   CENTRAL_TOKEN_USERNAME  - Central Portal user token username
#   CENTRAL_TOKEN_PASSWORD  - Central Portal user token password
#   GPG_PRIVATE_KEY         - ASCII-armored private key:
#                               gpg --armor --export-secret-keys <KEYID>
#   GPG_PASSPHRASE          - passphrase for that GPG key
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # setup-java writes ~/.m2/settings.xml with a `central` server that reads
      # MAVEN_USERNAME/MAVEN_PASSWORD, imports the GPG key, and wires up the passphrase env var.
      - name: Set up JDK 17, Maven settings and GPG
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Build, sign and deploy
        run: |
          chmod +x ./mvnw
          ./mvnw -B -ntp -Prelease clean deploy
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
